version: '3.8'

services:
  cinephile-db:
    image: mysql:8.0
    container_name: cinephile_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cinephile_db
    ports:
      - "3308:3306"
    volumes:
      # Automatically runs our schema file on first boot
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql
      # Persists data even if container stops
      - cinephile_mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  cinephile_mysql_data:
